sonar.projectKey=SchweizerischeBundesbahnen_pandoc-service
sonar.organization=schweizerischebundesbahnen

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=pandoc-service
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=app

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Additional parameters
sonar.python.xunit.reportPaths=junittest.xml
sonar.python.coverage.reportPaths=coverage.xml
#sonar.branch.target = main
#sonar.test.exclusions=tests/**
#sonar.tests=tests/
sonar.python.version=3.14
sonar.qualitygate.wait=true

# S5332 flags clear-text "http://" strings as potential network calls. The
# URIs in DocxColorPreProcess.py are OOXML namespace identifiers (ECMA-376)
# used as opaque tags by ElementTree - they are never dereferenced. The
# strings must match the spec verbatim or DOCX parsing breaks.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=app/DocxColorPreProcess.py
