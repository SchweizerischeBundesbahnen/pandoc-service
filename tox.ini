[tox]
envlist =
    ruff
    mypy
    test

[testenv]
runner = uv-venv-lock-runner
dependency_groups =
    dev
    test
setenv =
    # Store Playwright browsers inside .tox for better caching
    PLAYWRIGHT_BROWSERS_PATH = {toxworkdir}/.playwright
commands_pre =
    # Browser-based SVG conversion tests need a real Chromium; install it before running tests.
    playwright install chromium --with-deps
commands =
    coverage run -m pytest tests/ --junitxml="junittest.xml" -v
    coverage report -m --fail-under 90
    coverage xml

[testenv:ruff]
description = run ruff linter and formatter
package = skip
dependency_groups = dev
commands =
    ruff format
    ruff check

[testenv:mypy]
description = run mypy type checker
package = skip
dependency_groups = dev
commands =
    mypy .

[coverage:run]
relative_files = True
source = app/
branch = True
